services:
  postgres:
    image: postgres:17

    container_name: mybuildboard-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: mybuildboard
      POSTGRES_USER: wael
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: